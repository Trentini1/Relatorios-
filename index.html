                const vary = (val) => parseFloat((val + (Math.random() - 0.5) * 0.04).toFixed(2));
                const newMet = { ...data.metrology };
                Object.keys(defaults).forEach(k => {
                   if(Array.isArray(defaults[k])) newMet[k] = defaults[k].map(vary);
                   else if(typeof defaults[k] === 'number') newMet[k] = vary(defaults[k]);
                   else if(typeof defaults[k] === 'string') newMet[k] = data.metrology[k];
                });
                setData(prev => ({...prev, metrology: newMet}));
            };

               setData(prev => ({...prev, dyno: {
                   rpmLenta: Math.round(vary(DYNO_DEFAULTS[data.metrologyModel].rpmLenta, 20)),
                   rpmCarga: Math.round(vary(DYNO_DEFAULTS[data.metrologyModel].rpmCarga, 30)),
                   potencia: vary(DYNO_DEFAULTS[data.metrologyModel].potencia, 2), 
                   torque: vary(DYNO_DEFAULTS[data.metrologyModel].torque, 5),     
                   pressaoOleoLenta: Math.max(1.25, vary(DYNO_DEFAULTS[data.metrologyModel].pressaoOleoLenta, 0.3)),
                   pressaoOleoCarga: Math.max(3.0, vary(DYNO_DEFAULTS[data.metrologyModel].pressaoOleoCarga, 0.5)),
                   pressaoTurbo: Math.round(vary(DYNO_DEFAULTS[data.metrologyModel].pressaoTurbo, 5)),
                   tempAgua: Math.round(vary(DYNO_DEFAULTS[data.metrologyModel].tempAgua, 2))
               }}));
            };
            
            const randomizeChartVisuals = () => {

            const generateTimeChart = (type) => {
                let points = [];
                const steps = 100; 
                const width = 600;
                const height = 100;
                const seed = data.chartSeed; 

                const seededRandom = (i) => {
                    const x = Math.sin(seed * i * 1000) * 10000;
                    return x - Math.floor(x);
                }

                if (type === 'idle') {
                    const target = data.dyno.rpmLenta;
                    for(let i=0; i<=steps; i++) {
                        const x = (i/steps)*width;
                        const noiseBase = (seededRandom(i) - 0.5) * 30; 
                        const wave = Math.sin(i * 0.2 + seed * 10) * 10; 
                        const val = target + noiseBase + wave;
                        const y = height - ((val / 1200) * height); 
                        points.push(`${x},${y}`);
                    }
                } else { 
                    const target = 1800; 
                    const start = 800;
                    for(let i=0; i<=steps; i++) {
                        const x = (i/steps)*width;
                        let val;
                        
                        const rampEnd = 0.2 + (seededRandom(99) * 0.1); 
                        
                        if (i < steps * rampEnd) {
                            const progress = i / (steps * rampEnd);
                            val = start + ((target - start) * Math.pow(progress, 0.8)); 
                        } else {
                            val = target + ((seededRandom(i) - 0.5) * 5);
                        }
                        
                        const y = height - ((val / 2500) * height);
                        points.push(`${x},${y}`);
                    }
                }
                return points.join(' ');

                                    {currentPartsList.map((p,i)=><li key={i}>{p}</li>)}
                                </ul>
                                <h2 className="text-lg font-bold text-slate-800 mb-2 mt-8 border-b pb-1">ACABAMENTO</h2>
                                <div className="flex gap-4 h-32">
                                    <p className="w-2/3 technical-text">{BOILERPLATE.finalizacao}</p>
                                    <div className="w-1/3 border bg-gray-50 flex items-center justify-center overflow-hidden">{images.pintura?<img src={images.pintura} className="w-full h-full object-cover"/>:<span className="text-[10px] text-gray-400">PINTURA</span>}</div>
                                </div>
                            </div>
                            {data.observations && <div className="border p-2 text-xs bg-yellow-50 mt-4"><strong className="block mb-1">OBSERVAÇÕES:</strong>{data.observations}</div>}
                            <div className="border-t-2 border-slate-800 pt-8 mt-4 flex justify-center text-center">
                                <div><div className="w-64 border-b border-slate-900 mb-2"></div><p className="font-bold text-sm">CONTROLE DE QUALIDADE</p><p className="text-xs">Retiblocos Ltda</p></div>
                            </div>
                            <Footer page="6"/>
                        </div>

                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
